<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QuickLead</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>QuickLead</h1>
<p class="subtitulo">Sistema de alta performance para agendamentos</p>
</header>

<nav class="menu">
<button onclick="trocarAba('agendamento')">Agendar</button>
<button onclick="trocarAba('agenda')">Agenda</button>
<button onclick="trocarAba('filtro')">Filtro</button>
<button onclick="trocarAba('banco')">Banco</button>
<button onclick="trocarAba('relatorios')">Relatórios</button>
</nav>

<main>

<section id="agendamento" class="aba ativa">
<h2>Novo Agendamento</h2>

<div class="card">
<input id="nome" placeholder="Nome">
<input id="numero" placeholder="Número">

<select id="unidade">
<option value="">Selecionar unidade</option>
<option>Cidade Nova 2</option>
<option>Ananindeua</option>
<option>Marambaia</option>
<option>Jurunas</option>
<option>José Bonifácio</option>
<option>Augusto Montenegro</option>
<option>Telégrafo</option>
<option>Castanhal</option>
<option>Marabá</option>
<option>Capanema</option>
</select>

<div class="linha">
<input type="date" id="data">
<input type="time" id="hora">
</div>

<button class="btn-principal" onclick="agendar()">Agendar</button>
</div>
</section>

<section id="agenda" class="aba">
<h2>Agenda</h2>

<div class="card">
<input type="date" id="filtroData">
<button onclick="filtrarAgenda()">Filtrar</button>

<div id="listaAgenda"></div>
</div>
</section>

<section id="filtro" class="aba">
<h2>Filtro Inteligente</h2>

<div class="card">
<textarea id="entradaFiltro"></textarea>
<button class="btn-principal" onclick="filtrarLeads()">Filtrar</button>
<textarea id="saidaFiltro"></textarea>
</div>
</section>

<section id="banco" class="aba">
<h2>Banco de Leads</h2>

<div class="card">
<textarea id="entradaBanco"></textarea>
<button class="btn-principal" onclick="salvarBanco()">Salvar</button>
<div id="listaBanco"></div>
</div>
</section>

<section id="relatorios" class="aba">
<h2>Relatório</h2>

<div class="card">
<input type="date" id="dataRelatorio">
<button onclick="gerarRelatorio()">Gerar</button>
<pre id="resultadoRelatorio"></pre>
</div>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
